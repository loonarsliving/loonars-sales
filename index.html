<script>

const SK="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdsdW9pb2lpbWFweWhjaGRhc2ZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwNDQ3MjAsImV4cCI6MjA5NTYyMDcyMH0.dHVB0jJBMjUunJKSsqbaM3MGCAq-ZRSWQEqvEyUjIyk";
const SH={"Content-Type":"application/json","apikey":SK,"Authorization":"Bearer "+SK};
const UC={C:["C4","C3","C2","C1"],B:["B4","B3","B2","B1"],A:["A5","A4","A3","A2","A1"]};

["C4","C3","C2","C1"].forEach(c=>DB.units[c]=eu(c,"C"));

// Tersedia di Finance: A1,A2,A3,A4,B1,B3,C2,C3 → bisa diinput
// Tidak tersedia (sudah terjual): C1,C4,B2,B4,A5 → dikunci merah
(function(){

  SOLD.forEach(c=>{
    DB.units[c].status="sold";
    DB.units[c].type="akad";

function doPr(){const w=window.open("","_blank","width=900,height=700");w.document.write(`<!DOCTYPE html><html><head><style>body{margin:20px;background:#fff}@media print{body{margin:0}}</style></head><body>${window._pc}</body></html>`);w.document.close();setTimeout(()=>w.print(),800)}
async function ajFee(){
  const u=SL?DB.units[SL]:null;if(!u||!u.buyer){sN("Simpan data terlebih dahulu","error");return}
  if(!u.type||!u.price){sN("Lengkapi data transaksi","error");return}
  if(DB.fees.find(f=>f.unit===u.code&&f.status==="pending")){sN("Pengajuan fee unit ini sudah ada","error");return}
  const fe={id:Date.now(),unit:u.code,marketing:CU.nama,buyer:u.buyer,type:u.type,price:u.price,date:td(),status:"pending"};
  DB.fees.push(fe);
  try{await fetch(`${SU}/rest/v1/loonars_fee`,{method:"POST",headers:{...SH,"Prefer":"return=minimal"},body:JSON.stringify(fe)})}catch{}
  const tgMsg=`🚀 <b>PENGAJUAN FEE BARU</b>\n\n🏠 Unit: <b>${u.code}</b>\n👤 Pembeli: <b>${u.buyer}</b>\n💼 Jenis: <b>${u.type==="booking"?"Booking Fee":u.type==="dp"?"Down Payment":"Akad/Lunas"}</b>\n💰 Nilai: <b>${fR(u.price)}</b>\n📱 Marketing: <b>${CU.nama}</b>\n\n✅ Silakan cek dashboard Owner untuk approve.`;
  await sendTG(tgMsg);
  sN("🚀 Pengajuan fee dikirim ke Owner & Telegram!","success")
}
async function renderOwner(){document.getElementById("nv").innerHTML=`<button class="nt ac">Dashboard Owner</button>`;await loadDB();document.getElementById("pc").innerHTML=`<div class="stb"><button class="stbt ${OT==="summary"?"ac":""}" onclick="sOT('summary',event)">📊 Ringkasan</button><button class="stbt ${OT==="siteplan"?"ac":""}" onclick="sOT('siteplan',event)">🗺️ Siteplan</button><button class="stbt ${OT==="trx"?"ac":""}" onclick="sOT('trx',event)">📋 Transaksi</button><button class="stbt ${OT==="fee"?"ac":""}" onclick="sOT('fee',event)">💸 Fee${DB.fees.filter(f=>f.status==="pending").length>0?` <span style="background:var(--or);color:#fff;border-radius:10px;padding:1px 7px;font-size:10px;margin-left:4px;">${DB.fees.filter(f=>f.status==="pending").length}</span>`:""}</button><button class="stbt ${OT==="users"?"ac":""}" onclick="sOT('users',event)">👤 Users</button></div><div id="oc"></div>`;rOC()}
function sOT(t,e){OT=t;document.querySelectorAll(".stbt").forEach(b=>b.classList.remove("ac"));if(e)e.target.classList.add("ac");rOC()}
function rOC(){const el=document.getElementById("oc");if(!el)return;if(OT==="summary")el.innerHTML=rOS();else if(OT==="siteplan")el.innerHTML=buildSP(false);else if(OT==="trx")el.innerHTML=rOT();else if(OT==="fee")el.innerHTML=rOF();else if(OT==="users")rOU()}
function rOS(){const us=Object.values(DB.units),sd=us.filter(u=>u.status==="sold"),hd=us.filter(u=>u.status==="hold"),av=us.filter(u=>u.status==="available"),tv=sd.reduce((s,u)=>s+(u.price||0),0),pf=DB.fees.filter(f=>f.status==="pending").length,bm={};sd.forEach(u=>{const m=u.marketing||"—";if(!bm[m])bm[m]={c:0,v:0};bm[m].c++;bm[m].v+=u.price||0});
return`<div class="sr"><div class="sk"><div class="sl2">Unit Terjual</div><div class="sv" style="color:var(--r)">${sd.length}</div><div class="ss">dari ${us.length} total</div></div><div class="sk"><div class="sl2">Hold/Booking</div><div class="sv" style="color:var(--bl)">${hd.length}</div><div class="ss">menunggu konfirmasi</div></div><div class="sk"><div class="sl2">Tersedia</div><div class="sv" style="color:var(--gr)">${av.length}</div><div class="ss">siap ditawarkan</div></div></div>
<div class="tc"><div><div style="font-size:10px;color:var(--m);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px">Total Nilai Closing</div><div style="font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;color:var(--g)">${fR(tv)}</div></div><div style="font-size:11px;color:${pf>0?"var(--or)":"var(--gr)"};">${pf>0?pf+" fee pending":"Semua fee diproses"}</div></div>
<div class="tw"><div class="th"><div class="tt">Performa Marketing</div></div><table><thead><tr><th>Marketing</th><th>Closing</th><th>Total Nilai</th></tr></thead><tbody>${Object.entries(bm).map(([m,d])=>`<tr><td><strong>${m}</strong></td><td>${d.c} unit</td><td style="color:var(--g);font-weight:700">${fR(d.v)}</td></tr>`).join("")||`<tr><td colspan="3" style="text-align:center;color:var(--m);padding:22px">Belum ada transaksi</td></tr>`}</tbody></table></div>`}
function rOT(){const us=Object.values(DB.units).filter(u=>u.status!=="available"),tv=us.reduce((s,u)=>s+(u.price||0),0);return`<div class="tw"><div class="th"><div class="tt">Semua Transaksi (${us.length})</div><div style="font-size:12px;color:var(--g);font-weight:700">${fR(tv)}</div></div><div style="overflow-x:auto"><table><thead><tr><th>Unit</th><th>Pembeli</th><th>NIK</th><th>Telepon</th><th>Jenis</th><th>Nilai</th><th>Marketing</th><th>Tanggal</th><th>Status</th><th></th></tr></thead><tbody>${us.map(u=>`<tr><td><strong>${u.code}</strong></td><td>${u.buyer||"—"}</td><td style="font-size:10px">${u.nik||"—"}</td><td>${u.phone||"—"}</td><td><span class="bge bge-${u.type||""}">${u.type==="booking"?"Booking":u.type==="dp"?"DP":u.type==="akad"?"Akad":"—"}</span></td><td style="color:var(--g);font-weight:700">${u.price?fR(u.price):"—"}</td><td>${u.marketing||"—"}</td><td style="font-size:11px">${fD(u.date)}</td><td><span class="bge bge-${u.status}">${u.status.toUpperCase()}</span></td><td><button onclick="owD('${u.code}')" style="background:transparent;border:1px solid var(--b);color:var(--m);padding:3px 9px;border-radius:2px;cursor:pointer;font-size:10px;font-family:inherit">Detail</button></td></tr>`).join("")||`<tr><td colspan="10" style="text-align:center;color:var(--m);padding:24px">Belum ada transaksi</td></tr>`}</tbody></table></div></div>`}
function rOF(){if(!DB.fees.length)return`<div class="sc"><div class="em"><div style="font-size:32px">💸</div><div style="margin-top:8px">Belum ada pengajuan fee</div></div></div>`;const pf=DB.fees.filter(f=>f.status==="pending").length;return`<div class="tw"><div class="th"><div class="tt">Pengajuan Fee Marketing</div><div style="font-size:11px;color:${pf>0?"var(--or)":"var(--m)"};">${pf} pending</div></div><table><thead><tr><th>Unit</th><th>Marketing</th><th>Pembeli</th><th>Jenis</th><th>Nilai</th><th>Tanggal</th><th>Aksi</th></tr></thead><tbody>${DB.fees.map(f=>`<tr><td><strong>${f.unit}</strong></td><td>${f.marketing}</td><td>${f.buyer}</td><td><span class="bge bge-${f.type}">${f.type==="booking"?"Booking":f.type==="dp"?"DP":"Akad"}</span></td><td style="color:var(--g);font-weight:700">${fR(f.price)}</td><td style="font-size:11px">${fD(f.date)}</td><td>${f.status==="pending"?`<button onclick="apFee(${f.id})" style="background:var(--gr);border:none;color:#fff;padding:4px 10px;border-radius:2px;cursor:pointer;font-family:inherit;font-size:10px;font-weight:700;margin-right:3px">✓</button><button onclick="rjFee(${f.id})" style="background:var(--r);border:none;color:#fff;padding:4px 10px;border-radius:2px;cursor:pointer;font-family:inherit;font-size:10px;font-weight:700">✕</button>`:`<span class="bge bge-${f.status}">${f.status.toUpperCase()}</span>`}</td></tr>`).join("")}</tbody></table></div>`}
async function apFee(id){const f=DB.fees.find(r=>r.id===id);if(f){f.status="approved";DB.units[f.unit].feeStatus="paid"}try{await fetch(`${SU}/rest/v1/loonars_fee?id=eq.${id}`,{method:"PATCH",headers:{...SH,"Prefer":"return=minimal"},body:JSON.stringify({status:"approved"})})}catch{}sN("✅ Fee disetujui","success");rOC()}
async function rjFee(id){const f=DB.fees.find(r=>r.id===id);if(f)f.status="rejected";try{await fetch(`${SU}/rest/v1/loonars_fee?id=eq.${id}`,{method:"PATCH",headers:{...SH,"Prefer":"return=minimal"},body:JSON.stringify({status:"rejected"})})}catch{}sN("Fee ditolak","error");rOC()}
function owD(c){const u=DB.units[c];document.getElementById("mt").textContent="Detail Unit "+c;document.getElementById("mb2").innerHTML=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:13px">${[["Unit",`<span style="font-size:20px;font-family:'Cormorant Garamond',serif;font-weight:700;color:var(--g)">${u.code}</span>`],["Status",`<span class="bge bge-${u.status}">${u.status.toUpperCase()}</span>`],["Pembeli",`<strong>${u.buyer||"—"}</strong>`],["NIK",u.nik||"—"],["Telepon",u.phone||"—"],["Jenis",u.type||"—"],["Harga",u.price?`<strong style="color:var(--g)">${fR(u.price)}</strong>`:"—"],["Booking Fee",u.bf?fR(u.bf):"—"],["Down Payment",u.dp?fR(u.dp):"—"],["Pelunasan",u.pel?fR(u.pel):"—"],["Tanggal",fD(u.date)],["Marketing",u.marketing||"—"],["No. SPI",u.spiNo||"—"]].map(([l,v])=>`<div><div class="il">${l}</div><div style="font-size:13px">${v}</div></div>`).join("")}</div><div style="margin-top:13px;padding-top:13px;border-top:1px solid var(--b)"><div class="il">Alamat KTP</div><div style="font-size:13px">${u.address||"—"}</div></div>${u.status!=="available"?`<div style="margin-top:13px;padding-top:13px;border-top:1px solid var(--b)"><button class="btn bgh" style="font-size:11px" onclick="rstU('${c}')">Kembalikan ke Tersedia</button></div>`:""}`;document.getElementById("mf").innerHTML=`<button class="btn bgh" onclick="cm()">Tutup</button>`;document.getElementById("mo").classList.add("op")}
function rstU(c){DB.units[c]=eu(c,DB.units[c].row);cm();sN("Unit "+c+" direset","info");rOC()}

async function addU(){
  const n=document.getElementById("nun")?.value?.trim(),e=document.getElementById("nue")?.value?.trim().toLowerCase(),p=document.getElementById("nup")?.value,r=document.getElementById("nur")?.value;
  if(!n||!e||!p){sN("Nama, email, password wajib diisi","error");return}
  if(p.length<6){sN("Password minimal 6 karakter","error");return}
  try{const res=await fetch(`${SU}/rest/v1/loonars_users`,{method:"POST",headers:{...SH,"Prefer":"return=minimal"},body:JSON.stringify({nama:n,email:e,password_hash:p,role:r})});if(!res.ok)throw new Error(await res.text());sN("✅ User "+n+" berhasil ditambahkan!","success");rOU()}catch(e){sN("Gagal: "+e.message,"error")}
}
function edU(id){const u=UL.find(x=>x.id===id);if(!u)return;document.getElementById("mt").textContent="Edit User";document.getElementById("mb2").innerHTML=`<div class="fg2" style="gap:13px"><div class="iw"><label class="il">Nama</label><input class="inp" id="eun" value="${u.nama||""}"></div><div class="iw"><label class="il">Email</label><input class="inp" id="eue" value="${u.email}"></div><div class="iw"><label class="il">Password Baru</label><input class="inp" id="eup" type="password" placeholder="Kosongkan jika tidak ganti"></div><div class="iw"><label class="il">Role</label><select class="inp" id="eur"><option value="sales" ${u.role==="sales"?"selected":""}>Sales</option><option value="owner" ${u.role==="owner"?"selected":""}>Owner</option></select></div></div>`;document.getElementById("mf").innerHTML=`<button class="btn bgh" onclick="cm()">Batal</button><button class="btn bg" onclick="upU(${id})">💾 Simpan</button>`;document.getElementById("mo").classList.add("op")}
async function upU(id){const n=document.getElementById("eun")?.value?.trim(),e=document.getElementById("eue")?.value?.trim(),p=document.getElementById("eup")?.value,r=document.getElementById("eur")?.value,bd={nama:n,email:e,};if(p)bd.password_hash=p;try{const res=await fetch(`${SU}/rest/v1/loonars_users?id=eq.${id}`,{method:"PATCH",headers:{...SH,"Prefer":"return=minimal"},body:JSON.stringify(bd)});if(!res.ok)throw new Error(await res.text());sN("✅ User diperbarui","success");cm();rOU()}catch(e){sN("Gagal: "+e.message,"error")}}
