<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Loonars Living — Sales</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--g:#C9A84C;--g2:#F0D080;--d:#0A0A08;--d2:#111109;--d3:#1A1A14;--b:#2A2A1E;--t:#E8E4D0;--m:#7A7660;--r:#C0392B;--gr:#27AE60;--bl:#2980B9;--or:#D35400}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--d);color:var(--t);min-height:100vh}

/* LOGIN */
#Lv{display:flex;align-items:center;justify-content:center;min-height:100vh;background:radial-gradient(ellipse at 20% 60%,#1a1500,#0A0A08 55%)}
.lw{width:380px;animation:fu .6s ease both}
@keyframes fu{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.lb{font-family:'Cormorant Garamond',serif;font-size:46px;font-weight:700;color:var(--g);letter-spacing:6px;text-align:center}
.ls{font-size:10px;color:var(--m);letter-spacing:4px;text-transform:uppercase;text-align:center;margin:6px 0 12px}
.ld{width:50px;height:1px;background:#8a6c1e;margin:0 auto 28px}
.lbox{background:var(--d2);border:1px solid var(--b);border-radius:4px;padding:36px 32px}
.fg{margin-bottom:16px}
.fg label{display:block;font-size:10px;color:var(--m);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px;font-weight:600}
.inp{width:100%;padding:11px 13px;background:var(--d3);border:1px solid var(--b);border-radius:3px;color:var(--t);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color .2s}
.inp:focus{border-color:var(--g)}
.inp::placeholder{color:#5A5644}
.blg{width:100%;padding:13px;background:var(--g);border:none;border-radius:3px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;color:#000;margin-top:4px;transition:background .2s}
.blg:hover{background:var(--g2)}
.lerr{color:#E57373;font-size:12px;text-align:center;margin-top:10px;display:none}
.lld{color:var(--m);font-size:12px;text-align:center;margin-top:10px;display:none}

/* PROJECT PICKER */
#PP{display:none;align-items:center;justify-content:center;min-height:100vh;background:radial-gradient(ellipse at 80% 40%,#1a1500,#0A0A08 55%)}
.ppw{width:520px;max-width:96vw;padding:0 16px;animation:fu .5s ease both}
.ppt{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:700;color:var(--g);letter-spacing:4px;text-align:center;margin-bottom:6px}
.pps{font-size:10px;color:var(--m);letter-spacing:3px;text-transform:uppercase;text-align:center;margin-bottom:24px}
.ppgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ppcard{background:var(--d2);border:1.5px solid var(--b);border-radius:4px;padding:18px;cursor:pointer;transition:all .2s;text-align:center}
.ppcard:hover{border-color:var(--g);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.4)}
.ppcard-name{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:700;color:var(--g);margin-bottom:4px}
.ppcard-sub{font-size:10px;color:var(--m);letter-spacing:1px}
.ppcard-stat{font-size:10px;margin-top:8px;padding-top:8px;border-top:1px solid var(--b);display:flex;justify-content:space-around;gap:8px;flex-wrap:wrap}

/* APP */
#Av{display:none}
.tb{background:var(--d2);border-bottom:1px solid var(--b);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.tbl{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:var(--g);letter-spacing:3px}
.tbr{display:flex;align-items:center;gap:12px;font-size:11px;color:var(--m)}
.tbr strong{color:var(--g)}
.bsm{padding:6px 14px;border-radius:3px;border:1px solid var(--b);background:transparent;color:var(--m);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:all .2s}
.bsm:hover{border-color:var(--g);color:var(--g)}
.nav{background:var(--d2);border-bottom:1px solid var(--b);padding:0 24px;display:flex;overflow-x:auto}
.nt{padding:13px 16px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--m);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;letter-spacing:.5px;cursor:pointer;transition:all .2s;text-transform:uppercase;white-space:nowrap}
.nt.ac{color:var(--g);border-bottom-color:var(--g)}
.pc{padding:22px 26px;max-width:1280px}
.sc{background:var(--d2);border:1px solid var(--b);border-radius:4px;padding:22px;margin-bottom:18px}
.sh{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:600;color:var(--g);letter-spacing:2px;margin-bottom:16px;text-transform:uppercase}
.lg{display:flex;gap:18px;margin-bottom:14px;flex-wrap:wrap}
.li{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--m)}
.ld2{width:11px;height:11px;border-radius:2px;flex-shrink:0}
.spc{background:#131310;border:1px solid var(--b);border-radius:4px;padding:20px;overflow-x:auto}
.vb{background:linear-gradient(135deg,#1a1200,#2a1e00);border:1px solid #8a6c1e;border-radius:4px;padding:11px 18px;margin-bottom:18px;display:inline-block}
.vbt{font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:700;color:var(--g);letter-spacing:2px;text-transform:uppercase}
.vbs{font-size:10px;color:var(--m);margin-top:2px;letter-spacing:1px}
.rl{font-size:10px;color:#5A5644;letter-spacing:2px;font-weight:700;margin-bottom:5px;text-transform:uppercase}
.rw{display:flex;gap:4px;margin-bottom:4px;flex-wrap:wrap}
.sp{height:10px;background:var(--b);border-radius:2px;margin:3px 0}
/* Unit cells */
.uc{width:108px;min-height:74px;border:1.5px solid;border-radius:3px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .18s;padding:7px 5px;text-align:center;position:relative}
.uc.av{background:#0D1F0D;border-color:#1E4A1E;color:#4CAF50}
.uc.sd{background:#1F0A08;border-color:#5C1A14;color:#E57373;cursor:default}
.uc.hd{background:#0A1A2A;border-color:#1a4060;color:#5DADE2;cursor:default}
.uc.sl{background:#2A1E00;border-color:var(--g);color:var(--g);box-shadow:0 0 14px rgba(201,168,76,.3)}
.uc:hover.av{transform:translateY(-2px);box-shadow:0 5px 18px rgba(0,0,0,.4)}
.uco{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:700;letter-spacing:1px;line-height:1}
.ucs{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;margin-top:2px;opacity:.8}
.ucb{font-size:8px;color:rgba(255,255,255,.4);margin-top:2px;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* Forms */
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.iw{display:flex;flex-direction:column}
.il{font-size:10px;color:var(--m);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px;font-weight:600}
.pw{position:relative}
.pp{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--m);font-size:12px;font-weight:700}
.pw .inp{padding-left:34px}
/* Trx type buttons */
.tr{display:flex;gap:6px}
.tb2{flex:1;padding:10px 5px;border-radius:3px;border:1.5px solid var(--b);background:var(--d3);color:var(--m);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;text-align:center}
.tb2:hover{border-color:var(--g);color:var(--g)}
.tb2.ab{background:#0A1A2A;border-color:#2980B9;color:#5DADE2}
.tb2.ad{background:#0A1F0A;border-color:#27AE60;color:#58D68D}
.tb2.aa{background:#1F0808;border-color:#C0392B;color:#EC7063}
/* Buttons */
.ar{display:flex;gap:9px;flex-wrap:wrap;margin-top:18px}
.btn{padding:10px 18px;border-radius:3px;border:none;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;letter-spacing:.5px;cursor:pointer;transition:all .2s;text-transform:uppercase}
.bg{background:var(--g);color:#000}.bg:hover{background:var(--g2)}
.bgh{background:transparent;border:1px solid var(--b);color:var(--m)}.bgh:hover{border-color:var(--g);color:var(--g)}
.bgr{background:var(--gr);color:#fff}.bgr:hover{background:#219A52}
.bbl{background:var(--bl);color:#fff}.bbl:hover{background:#1F618D}
.bfe{background:linear-gradient(135deg,var(--or),#E67E22);color:#fff;font-size:13px;padding:11px 22px}
.bfe:hover{transform:translateY(-1px);opacity:.9}
.sut{background:var(--g);color:#000;border-radius:2px;padding:3px 10px;font-size:13px;font-weight:800;letter-spacing:1px;font-family:'Cormorant Garamond',serif}
.em{text-align:center;padding:36px 20px;color:var(--m)}
/* Summary */
.sr{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:18px}
.sk{background:var(--d2);border:1px solid var(--b);border-radius:4px;padding:18px}
.sl2{font-size:10px;color:var(--m);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:7px}
.sv{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:700;line-height:1}
.ss{font-size:11px;color:var(--m);margin-top:5px}
.tc{background:var(--d2);border:1px solid var(--b);border-radius:4px;padding:18px;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between}
/* Tables */
.tw{background:var(--d2);border:1px solid var(--b);border-radius:4px;overflow:hidden;margin-bottom:18px}
.th{padding:14px 18px;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between}
.tt{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:600;color:var(--g);letter-spacing:1.5px;text-transform:uppercase}
table{width:100%;border-collapse:collapse}
th{padding:10px 14px;text-align:left;font-size:10px;color:var(--m);font-weight:700;letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--b)}
td{padding:11px 14px;font-size:12px;border-bottom:1px solid rgba(42,42,30,.5)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(201,168,76,.03)}
/* Badges */
.bge{display:inline-block;padding:2px 8px;border-radius:2px;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.bge-sold{background:rgba(192,57,43,.2);color:#E57373}
.bge-hold,.bge-booking,.bge-dp{background:rgba(41,128,185,.2);color:#5DADE2}
.bge-available{background:rgba(39,174,96,.2);color:#58D68D}
.bge-akad{background:rgba(211,84,0,.2);color:#F0B27A}
.bge-pending{background:rgba(211,84,0,.2);color:#F0B27A}
.bge-approved{background:rgba(39,174,96,.2);color:#58D68D}
.bge-rejected{background:rgba(127,140,141,.2);color:#BDC3C7}
.bge-sales{background:rgba(41,128,185,.2);color:#5DADE2}
.bge-owner{background:rgba(201,168,76,.2);color:var(--g)}
/* Modal */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:1000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(3px);padding:16px}
.mo.op{display:flex}
.mb{background:var(--d2);border:1px solid var(--b);border-radius:4px;width:760px;max-width:98vw;max-height:92vh;overflow-y:auto}
.mh{padding:18px 22px;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--d2);z-index:10}
.mt2{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700;color:var(--g);letter-spacing:2px;text-transform:uppercase}
.mcb{width:28px;height:28px;border-radius:3px;background:var(--d3);border:1px solid var(--b);color:var(--m);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.mcb:hover{border-color:var(--r);color:var(--r)}
.mbdy{padding:22px}
.mf{padding:14px 22px;border-top:1px solid var(--b);display:flex;gap:9px;justify-content:flex-end;position:sticky;bottom:0;background:var(--d2)}
/* Notif */
.nt2{position:fixed;bottom:22px;right:22px;z-index:2000;background:var(--d3);border:1px solid var(--b);border-radius:4px;padding:12px 18px;font-size:12px;font-weight:600;box-shadow:0 8px 30px rgba(0,0,0,.5);transform:translateY(80px);opacity:0;transition:all .3s;max-width:320px;line-height:1.4}
.nt2.sh2{transform:translateY(0);opacity:1}
.nt2.success{border-color:var(--gr);color:#58D68D}
.nt2.error{border-color:var(--r);color:#E57373}
.nt2.info{border-color:var(--g);color:var(--g)}
/* Print */
@media print{body>*:not(#pr){display:none!important}#pr{display:block!important;background:#fff;color:#111;padding:20px}}
#pr{display:none}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="Lv">
  <div class="lw">
    <div class="lb">LOONARS</div>
    <div class="ld"></div>
    <div class="ls">Private Living — Sales Management</div>
    <div class="lbox">
      <div class="fg"><label>Email</label><input class="inp" id="le" type="email" placeholder="email@example.com" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <div class="fg"><label>Password</label><input class="inp" id="lp" type="password" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <button class="blg" id="lbtn" onclick="doLogin()">MASUK</button>
      <div class="lld" id="lld">⏳ Memverifikasi...</div>
      <div class="lerr" id="lerr"></div>
    </div>
  </div>
</div>

<!-- PROJECT PICKER -->
<div id="PP">
  <div class="ppw">
    <div class="ppt">LOONARS</div>
    <div class="pps">Pilih Project</div>
    <div class="ppgrid" id="ppgrid"></div>
    <div style="text-align:center;margin-top:20px">
      <button class="bsm" onclick="doLogout()">🔒 Keluar</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="Av">
  <div class="tb">
    <div class="tbl">LOONARS <span id="tb-proj" style="font-size:13px;color:var(--m);letter-spacing:1px;font-family:'DM Sans',sans-serif;font-weight:400;"></span></div>
    <div class="tbr">
      <strong id="tu"></strong>
      <button class="bsm" onclick="goBack()">⬅ Ganti Project</button>
      <button class="bsm" onclick="doLogout()">Keluar</button>
    </div>
  </div>
  <div class="nav" id="nv"></div>
  <div class="pc" id="pc"></div>
</div>

<!-- MODAL -->
<div class="mo" id="mo">
  <div class="mb">
    <div class="mh">
      <div class="mt2" id="mt2"></div>
      <button class="mcb" onclick="closeModal()">✕</button>
    </div>
    <div class="mbdy" id="mbdy"></div>
    <div class="mf" id="mf2"></div>
  </div>
</div>

<!-- NOTIF -->
<div class="nt2" id="nt2"></div>

<!-- PRINT -->
<div id="pr"></div>

<script>
const SU="https://gluoioiimapyhchdasfl.supabase.co";
const SK="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdsdW9pb2lpbWFweWhjaGRhc2ZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwNDQ3MjAsImV4cCI6MjA5NTYyMDcyMH0.dHVB0jJBMjUunJKSsqbaM3MGCAq-ZRSWQEqvEyUjIyk";
const SH={"Content-Type":"application/json","apikey":SK,"Authorization":"Bearer "+SK};
const TG_TOKEN="8972034832:AAGCLi9HuGbmzC9O13wH9X8YxVTPG6kMQr8";
const TG_CHAT="-5180682189";

async function tgSend(msg){try{await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TG_CHAT}&parse_mode=HTML&text=${encodeURIComponent(msg)}`,{method:"GET",mode:"no-cors"})}catch{}}

// ── PROJECT HARDCODED ─────────────────────────────────────────────
const PROYEK_HC=[
  {id:"AFP",nama:"Al Fath Puuwatu",  lokasi:"Puuwatu, Kendari",       warna:"#f0a500"},
  {id:"IH", nama:"Introvert House",  lokasi:"Sleman, DIY",            warna:"#00b894"},
  {id:"LL", nama:"Loonars Living",   lokasi:"Sendangadi, Sleman, DIY",warna:"#a78bfa"},
  {id:"GCI",nama:"Griya Cariu Indah",lokasi:"Cariu, Bogor",           warna:"#38bdf8"},
];

// ── STATE ─────────────────────────────────────────────────────────
let CU=null;       // current user {email, nama, role, id}
let CP=null;       // current project {id, nama, warna, lokasi}
let ALL_PJ=[...PROYEK_HC]; // semua project (hardcoded + dynamic)
let ASET_DB=[];    // aset dari DB untuk project aktif
let SP_LAYOUT=[];  // siteplan layout [{row, units:[]}]
let UNITS={};      // unit data in-memory: code -> obj
let FEES=[];       // fee list
let SL=null;       // selected unit code
let CT="";         // current transaction type
let OT="summary";  // owner tab

// ── HELPERS ───────────────────────────────────────────────────────
const fR=n=>"Rp "+parseInt(n||0).toLocaleString("id-ID");
const fD=d=>{if(!d)return"—";try{return new Date(d).toLocaleDateString("id-ID",{day:"2-digit",month:"long",year:"numeric"})}catch{return d}};
const td=()=>new Date().toISOString().split("T")[0];
const gD=d=>{try{return["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"][new Date(d).getDay()]}catch{return"—"}};
const gR=d=>{try{return["I","II","III","IV","V","VI","VII","VIII","IX","X","XI","XII"][new Date(d).getMonth()]}catch{return"I"}};

let _spiN=7,_kwtN=0;
const nSPI=()=>"SPI-LL-"+String(++_spiN).padStart(3,"0");
const nKWT=()=>"KWT-LL-"+String(++_kwtN).padStart(4,"0");

function mkU(code){return{code,status:"available",buyer:"",nik:"",phone:"",address:"",type:"",price:0,bf:0,dp:0,pel:0,marketing:"",date:"",handover:"",spiNo:""}}

function sN(m,t="info"){
  const e=document.getElementById("nt2");
  e.textContent=m;e.className="nt2 sh2 "+t;
  clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove("sh2"),3500);
}
function closeModal(){document.getElementById("mo").classList.remove("op")}
document.getElementById("mo").addEventListener("click",e=>{if(e.target===e.currentTarget)closeModal()});

function terbilang(n){
  if(!n||isNaN(n))return"nol";
  const s=["","satu","dua","tiga","empat","lima","enam","tujuh","delapan","sembilan"];
  function b(x){
    if(x===0)return"";if(x<10)return s[x]+" ";if(x===10)return"sepuluh ";if(x===11)return"sebelas ";
    if(x<20)return s[x-10]+" belas ";
    if(x<100)return["","","dua puluh","tiga puluh","empat puluh","lima puluh","enam puluh","tujuh puluh","delapan puluh","sembilan puluh"][Math.floor(x/10)]+" "+b(x%10);
    if(x<200)return"seratus "+b(x-100);return s[Math.floor(x/100)]+" ratus "+b(x%100);
  }
  let r="",x=parseInt(n);
  if(x>=1e9){r+=b(Math.floor(x/1e9))+"miliar ";x%=1e9}
  if(x>=1e6){r+=b(Math.floor(x/1e6))+"juta ";x%=1e6}
  if(x>=1000){r+=(Math.floor(x/1000)===1?"seribu ":b(Math.floor(x/1000))+"ribu ");x%=1000}
  return(r+b(x)).trim().replace(/\s+/g," ");
}

// ── LOGIN ─────────────────────────────────────────────────────────
async function doLogin(){
  const em=document.getElementById("le").value.trim().toLowerCase();
  const pw=document.getElementById("lp").value;
  const er=document.getElementById("lerr");
  const ld=document.getElementById("lld");
  er.style.display="none";
  if(!em||!pw){er.textContent="⚠ Email dan password wajib";er.style.display="block";return}
  ld.style.display="block";
  document.getElementById("lbtn").disabled=true;
  try{
    const r=await fetch(`${SU}/rest/v1/loonars_users?email=eq.${encodeURIComponent(em)}&select=*`,{headers:SH});
    if(!r.ok)throw new Error("Koneksi gagal");
    const rows=await r.json();
    if(!rows.length){er.textContent="⚠ Email tidak terdaftar";er.style.display="block";return}
    const u=rows[0];
    if(u.password_hash!==pw){er.textContent="⚠ Password salah";er.style.display="block";return}
    CU={email:u.email,nama:u.nama||u.email,role:(u.role||"sales").toLowerCase(),id:u.id};
    document.getElementById("tu").textContent=CU.nama+" ("+CU.role+")";
    document.getElementById("Lv").style.display="none";
    await loadAllProjects();
    showPicker();
  }catch(e){er.textContent="⚠ Gagal: "+e.message;er.style.display="block"}
  finally{ld.style.display="none";document.getElementById("lbtn").disabled=false}
}

function doLogout(){
  CU=null;CP=null;SL=null;CT="";OT="summary";
  UNITS={};FEES=[];ASET_DB=[];SP_LAYOUT=[];ALL_PJ=[...PROYEK_HC];
  document.getElementById("Lv").style.display="flex";
  document.getElementById("PP").style.display="none";
  document.getElementById("Av").style.display="none";

// ── LOAD PROJECT DATA ─────────────────────────────────────────────
async function loadProjectData(){
  UNITS={};ASET_DB=[];SP_LAYOUT=[];FEES=[];
  try{
    // 1. Aset
    const ra=await fetch(`${SU}/rest/v1/aset?proyek=eq.${CP.id}&select=*`,{headers:SH});
    if(ra.ok){
      ASET_DB=await ra.json();
      ASET_DB.forEach(row=>{
        const c=row.blok;if(!c)return;
        UNITS[c]=mkU(c);
        UNITS[c].status=row.status==="terjual"?"sold":row.status==="dp"?"hold":"available";
        UNITS[c].buyer=row.pembeli||"";
        UNITS[c].price=parseFloat(row.harga)||0;
        UNITS[c].date=row.tgl_jual||"";
        // Parse extra info dari ket field (JSON)
        try{const x=JSON.parse(row.ket||"{}");if(x&&typeof x==="object"){Object.keys(x).forEach(k=>{if(x[k]!==undefined&&x[k]!=="")UNITS[c][k]=x[k]})}}catch{}
      });
    }
    // 2. Siteplan layout — kolom layout adalah JSONB di Supabase
    // JSONB dikembalikan sudah sebagai object/array, TIDAK perlu JSON.parse lagi
    const rs=await fetch(`${SU}/rest/v1/loonars_siteplan?proyek=eq.${CP.id}&select=*&order=id.desc&limit=1`,{headers:SH});
    if(rs.ok){
      const sl=await rs.json();
      if(sl.length&&sl[0].layout){
        const raw=sl[0].layout;
        // Jika raw adalah string (table pakai TEXT bukan JSONB), parse dulu
        SP_LAYOUT=typeof raw==="string"?JSON.parse(raw):raw;
        if(!Array.isArray(SP_LAYOUT))SP_LAYOUT=[];
      }
    }
    // 3. Fees
    const rf=await fetch(`${SU}/rest/v1/loonars_fee?proyek=eq.${CP.id}&select=*&order=id.desc`,{headers:SH});
    if(rf.ok)FEES=await rf.json();
  }catch(e){console.warn("loadProjectData:",e)}
}

// ── SAVE UNIT KE DB ───────────────────────────────────────────────
async function saveUnitDB(u){
  // BUG FIX: status mapping yang benar
  // booking/hold → "dp" di DB, akad/sold → "terjual" di DB, available → "tersedia"
  const statusMap={sold:"terjual",hold:"dp",available:"tersedia"};
  const dbStatus=statusMap[u.status]||"tersedia";
  const extra=JSON.stringify({nik:u.nik,phone:u.phone,address:u.address,type:u.type,spiNo:u.spiNo,marketing:u.marketing,bf:u.bf,dp:u.dp,pel:u.pel,handover:u.handover});
  const payload={status:dbStatus,pembeli:u.buyer,tgl_jual:u.date,harga:u.price,ket:extra};

  try{
    const asetRow=ASET_DB.find(a=>a.blok===u.code);
    if(asetRow){
      // Update by id (paling reliable)
      await fetch(`${SU}/rest/v1/aset?id=eq.${asetRow.id}`,{method:"PATCH",headers:{...SH,"Prefer":"return=minimal"},body:JSON.stringify(payload)});
      // Update local cache
      const idx=ASET_DB.findIndex(a=>a.id===asetRow.id);
      if(idx>-1)Object.assign(ASET_DB[idx],payload);
    }else{
      // Fallback: cari by proyek+blok
      const ck=await fetch(`${SU}/rest/v1/aset?proyek=eq.${CP.id}&blok=eq.${encodeURIComponent(u.code)}&select=id`,{headers:SH});
      const rw=ck.ok?await ck.json():[];
      if(rw.length){
        await fetch(`${SU}/rest/v1/aset?proyek=eq.${CP.id}&blok=eq.${encodeURIComponent(u.code)}`,{method:"PATCH",headers:{...SH,"Prefer":"return=minimal"},body:JSON.stringify(payload)});
      }else{
        // Buat baru
        await fetch(`${SU}/rest/v1/aset`,{method:"POST",headers:{...SH,"Prefer":"return=minimal"},body:JSON.stringify({proyek:CP.id,tipe:"Unit",blok:u.code,luas:0,harga:u.price,...payload})});
      }
    }
    // Catat ke jurnal jika akad/terjual
    if(u.status==="sold"){
      const jno=CP.id+"-"+u.code+"-"+Date.now().toString().slice(-5);
      const jket=`Penjualan ${CP.nama} Unit ${u.code} — ${u.buyer}`;
      await fetch(`${SU}/rest/v1/jurnal`,{method:"POST",headers:{...SH,"Prefer":"return=minimal"},body:JSON.stringify([
        {tgl:u.date||td(),no:jno,ket:jket,akun:"1-1001",nama:"Kas Tunai",proyek:CP.id,d:u.price,k:0},
        {tgl:u.date||td(),no:jno,ket:jket,akun:"4-1001",nama:"Penjualan",proyek:CP.id,d:0,k:u.price},
      ])});
    }
    return true;
  }catch(e){console.warn("saveUnitDB:",e);return false}
}

  SP_LAYOUT.forEach(row=>{

async function doSaveUnit(){
  if(!SL)return;
  const t=CT||UNITS[SL]?.type;
  if(!t){sN("Pilih jenis transaksi dahulu","error");return}
  const buyer=(document.getElementById("fb")?.value||"").trim();
  if(!buyer){sN("Nama pembeli wajib diisi","error");return}

  const u=UNITS[SL]||mkU(SL);
  u.buyer=buyer;
  u.nik=(document.getElementById("fn")?.value||"").trim();
  u.phone=(document.getElementById("fp")?.value||"").trim();
  u.date=document.getElementById("fd")?.value||td();
  u.address=(document.getElementById("fa")?.value||"").trim();
  u.price=parseInt(document.getElementById("fpr")?.value||0);
  u.bf=parseInt(document.getElementById("fbf")?.value||0);
  u.dp=parseInt(document.getElementById("fdp")?.value||0);
  u.pel=parseInt(document.getElementById("fpl")?.value||0);
  u.handover=document.getElementById("fh")?.value||"";
  u.type=t;
  u.marketing=CU.nama;
  if(!u.spiNo)u.spiNo=nSPI();
  UNITS[SL]=u;

  // BUG FIX: status yang benar
  // booking → hold (sudah dipesannya, tapi belum DP)
  // dp → hold (sudah DP, tapi belum akad)
  // akad → sold (sudah lunas/akad)
  u.status=t==="akad"?"sold":"hold";

  const ok=await saveUnitDB(u);

  if(u.status==="sold"||u.status==="hold"){
    await tgSend(`💰 <b>UNIT ${u.code} ${u.status==="sold"?"TERJUAL/AKAD":"BOOKING/DP"}</b>\n\n🏠 Project: <b>${CP.nama}</b>\n👤 Pembeli: <b>${u.buyer}</b>\n💼 Jenis: <b>${t==="booking"?"Booking Fee":t==="dp"?"Down Payment":"Akad/Lunas"}</b>\n💰 Nilai: <b>${fR(u.price)}</b>\n📱 Marketing: <b>${CU.nama}</b>`);

  renderSales();
}

// ── KELOLA PROJECT — SITEPLAN BUILDER ────────────────────────────
function buildKelola(){
  const unitCodes=ASET_DB.map(a=>a.blok).filter(Boolean).sort();
  const assignedCodes=SP_LAYOUT.flatMap(r=>r.units||[]);
  const unassigned=unitCodes.filter(c=>!assignedCodes.includes(c));

  return`<div style="max-width:900px">



    <!-- Info project -->
    <div class="sc" style="border-left:3px solid var(--g)">
      <div style="font-size:12px;font-weight:700;color:var(--g);margin-bottom:6px">⚙️ Kelola: ${CP.nama}</div>
      <div style="font-size:11px;color:var(--m);line-height:1.8">
        ${unitCodes.length} unit terdaftar di sistem keuangan · ${assignedCodes.length} sudah di-layout · ${unassigned.length} belum di-layout
      </div>
    </div>

    <!-- Unit pool -->
    <div class="sc">
      <div class="sh" style="font-size:14px">Unit Terdaftar (${unitCodes.length})</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;padding:12px;background:var(--d3);border-radius:4px;min-height:44px">
        ${unitCodes.length===0
          ?`<div style="font-size:11px;color:var(--m)">Belum ada unit. Input dulu via menu Aset di sistem keuangan.</div>`
          :unitCodes.map(c=>{
            const inLayout=assignedCodes.includes(c);
            const st=UNITS[c]?.status||"available";
            const stColor=st==="sold"?"#E57373":st==="hold"?"#5DADE2":"#58D68D";
            return`<span title="${inLayout?"Sudah di layout":"Belum di layout"} · Status: ${st}" style="padding:3px 10px;border-radius:3px;font-size:11px;font-weight:700;border:1px solid ${inLayout?"var(--g)":"var(--b)"};color:${inLayout?"var(--g)":stColor};background:${inLayout?"rgba(201,168,76,0.08)":"transparent"}">${c}</span>`;
          }).join("")}
      </div>
    </div>

    <!-- Layout builder -->
    <div class="sc">
      <div class="sh" style="font-size:14px">Layout Siteplan (${SP_LAYOUT.length} baris)</div>

      <!-- Existing rows -->
      <div id="sprows">
        ${SP_LAYOUT.length===0
          ?`<div style="text-align:center;padding:28px;color:var(--m);border:1px dashed var(--b);border-radius:4px;font-size:12px;margin-bottom:14px">Belum ada baris. Tambahkan di form bawah.</div>`
          :SP_LAYOUT.map((row,ri)=>`
            <div style="background:var(--d3);border:1px solid var(--b);border-radius:4px;padding:12px 14px;margin-bottom:8px">
              <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
                <div style="font-size:10px;color:var(--m);font-weight:700;letter-spacing:1px;text-transform:uppercase;min-width:60px;flex-shrink:0">Row ${row.row}</div>
                <div style="display:flex;flex-wrap:wrap;gap:4px;flex:1">
                  ${(row.units||[]).map(c=>{
                    const st=UNITS[c]?.status||"available";
                    const bg=st==="sold"?"rgba(192,57,43,.25)":st==="hold"?"rgba(41,128,185,.25)":"rgba(39,174,96,.15)";
                    const bc=st==="sold"?"#C0392B":st==="hold"?"#2980B9":"#27AE60";
                    const tc=st==="sold"?"#E57373":st==="hold"?"#5DADE2":"#58D68D";
                    return`<span style="background:${bg};border:1px solid ${bc};padding:2px 8px;border-radius:3px;font-size:11px;font-weight:700;color:${tc}">${c}</span>`;
                  }).join("")}
                </div>
                <button onclick="removeRow(${ri})" style="background:none;border:1px solid var(--r);color:var(--r);padding:3px 10px;border-radius:3px;cursor:pointer;font-size:10px;font-family:inherit;white-space:nowrap;flex-shrink:0">🗑 Hapus</button>
              </div>
              <div style="font-size:10px;color:var(--m);display:flex;align-items:center;gap:8px">
                Edit unit:
                <input class="inp" id="rowedit-${ri}" value="${(row.units||[]).join(",")}" style="display:inline-block;width:auto;flex:1;padding:5px 10px;font-size:11px" placeholder="A1,A2,A3"/>
              </div>
            </div>`).join("")}
      </div>

      <!-- Tambah row baru -->
      <div style="background:var(--d3);border:1px solid var(--b);border-radius:4px;padding:14px;margin-bottom:14px">
        <div class="il" style="margin-bottom:8px">Tambah Baris Baru</div>
        <div style="display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap">
          <div style="min-width:120px">
            <label class="il" style="margin-bottom:4px">Nama Row</label>
            <input class="inp" id="new-rname" placeholder="A, B, C, Blok 1..." style="max-width:160px"/>
          </div>
          <div style="flex:2;min-width:200px">
            <label class="il" style="margin-bottom:4px">Unit (pisah koma)</label>
            <input class="inp" id="new-runits" placeholder="A1,A2,A3,A4"/>
          </div>
          <button class="btn bg" onclick="addRow()" style="white-space:nowrap;flex-shrink:0">+ Tambah Baris</button>
        </div>
        <div style="font-size:10px;color:var(--m);margin-top:6px">Masukkan kode unit yang terdaftar di aset. Pisahkan dengan koma, tanpa spasi.</div>
      </div>

      <!-- Aksi -->
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn bg" onclick="saveSiteplan()">💾 Simpan Siteplan</button>
        <button class="btn bgh" onclick="resetSiteplan()">🗑 Reset Semua</button>
        <button class="btn bbl" style="margin-left:auto" onclick="setOT('siteplan');renderOC()">👁 Preview</button>
      </div>
    </div>
  </div>`;
}

function addRow(){
  const name=(document.getElementById("new-rname")?.value||"").trim();
  const raw=(document.getElementById("new-runits")?.value||"").trim();
  if(!name){sN("Nama baris wajib diisi","error");return}
  if(!raw){sN("Masukkan unit untuk baris ini","error");return}
  const units=raw.split(",").map(u=>u.trim().toUpperCase()).filter(Boolean);
  if(!units.length){sN("Format unit tidak valid","error");return}
  // Warning jika ada unit yang tidak ditemukan di aset
  const notFound=units.filter(u=>!ASET_DB.find(a=>a.blok===u));
  if(notFound.length)sN(`⚠ Unit tidak ada di aset: ${notFound.join(", ")}. Tetap ditambahkan.`,"info");
  // Sync perubahan row yang ada sebelum tambah baru
  syncRowEdits();
  SP_LAYOUT.push({row:name,units});
  document.getElementById("new-rname").value="";
  document.getElementById("new-runits").value="";
  // Re-render kelola section saja
  document.getElementById("oc").innerHTML=buildKelola();
  sN(`Baris "${name}" ditambahkan (${units.length} unit)`,"success");
}

function removeRow(ri){
  syncRowEdits();
  SP_LAYOUT.splice(ri,1);
  document.getElementById("oc").innerHTML=buildKelola();
  sN("Baris dihapus","info");
}

// Sync input edits ke SP_LAYOUT sebelum operasi lain
function syncRowEdits(){
  SP_LAYOUT.forEach((row,ri)=>{
    const el=document.getElementById(`rowedit-${ri}`);
    if(el){
      const units=el.value.split(",").map(u=>u.trim().toUpperCase()).filter(Boolean);
      if(units.length)row.units=units;
    }
  });
}

function resetSiteplan(){
  if(!confirm("Reset semua layout siteplan?"))return;
  SP_LAYOUT=[];
  document.getElementById("oc").innerHTML=buildKelola();
  sN("Siteplan direset","info");
}

async function saveSiteplan(){
  if(!SP_LAYOUT.length){sN("Layout kosong, tambahkan baris dulu","error");return}
  // Sync semua row edits terlebih dahulu
  syncRowEdits();

  try{
    // BUG FIX: Supabase JSONB column → kirim sebagai object/array langsung, BUKAN JSON.stringify
    // Supabase akan menerima array JS dan simpan sebagai JSONB
    const payload={proyek:CP.id,layout:SP_LAYOUT,updated_at:new Date().toISOString()};

    // Cek apakah record sudah ada untuk project ini
    const ck=await fetch(`${SU}/rest/v1/loonars_siteplan?proyek=eq.${CP.id}&select=id&limit=1`,{headers:SH});
    const existing=ck.ok?await ck.json():[];

    if(existing&&existing.length>0){
      // Update existing
      await fetch(`${SU}/rest/v1/loonars_siteplan?proyek=eq.${CP.id}`,{
        method:"PATCH",
        headers:{...SH,"Prefer":"return=minimal"},
        body:JSON.stringify({layout:SP_LAYOUT,updated_at:new Date().toISOString()})
      });
    }else{
      // Insert baru
      await fetch(`${SU}/rest/v1/loonars_siteplan`,{
        method:"POST",
        headers:{...SH,"Prefer":"return=minimal"},
        body:JSON.stringify({proyek:CP.id,layout:SP_LAYOUT})
      });
    }
    sN("✅ Siteplan berhasil disimpan!","success");
    document.getElementById("oc").innerHTML=buildKelola();
  }catch(e){sN("Gagal simpan: "+e.message,"error")}
}

async function addUser(){
  const n=(document.getElementById("nun")?.value||"").trim();
  const e=(document.getElementById("nue")?.value||"").trim().toLowerCase();
  const p=document.getElementById("nup")?.value||"";
  const r=document.getElementById("nur")?.value||"sales";
  if(!n||!e||!p){sN("Nama, email, password wajib","error");return}
  if(p.length<6){sN("Password minimal 6 karakter","error");return}
  try{
    const res=await fetch(`${SU}/rest/v1/loonars_users`,{method:"POST",headers:{...SH,"Prefer":"return=minimal"},body:JSON.stringify({nama:n,email:e,password_hash:p,role:r})});

function openPrint(title,html){
  document.getElementById("mt2").textContent=title;
  document.getElementById("mbdy").innerHTML=html;
  window._printHTML=html;
  document.getElementById("mf2").innerHTML=`
    <button class="btn bgh" onclick="closeModal()">Tutup</button>
    <button class="btn bg" onclick="doPrint()">🖨️ Cetak / PDF</button>`;
  document.getElementById("mo").classList.add("op");
}
function doPrint(){
  const w=window.open("","_blank","width=900,height=700");
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{margin:20px;background:#fff}@media print{body{margin:0}}</style></head><body>${window._printHTML}</body></html>`);
  w.document.close();
  setTimeout(()=>w.print(),800);
}
